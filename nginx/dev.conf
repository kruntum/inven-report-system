events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Nginx configuration for Local Development
    server {
        listen 6006;
        server_name localhost;

        # Max upload size for document files (PDF/Images)
        client_max_body_size 20M;

        # 1. API Route - Proxy to Hono Backend (Running locally on host machine at port 6001)
        location /api/ {
            proxy_pass http://host.docker.internal:6001/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. MinIO Storage Route - Proxy directly to MinIO API and storage-bucket (port 6007)
        location /storage/ {
            proxy_pass http://host.docker.internal:6007/storage-bucket/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Disable buffering for large uploads
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # 3. Web App Route - Proxy to Vite Dev Server (Running locally on host machine at port 5173)
        location / {
            proxy_pass http://host.docker.internal:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
